services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: test
    ports:
      # Use a non-default host port to avoid colliding with a system PG.
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d test"]
      interval: 2s
      timeout: 5s
      retries: 15
    # Ephemeral data — wipe on container removal. Suitable for tests.
    tmpfs:
      - /var/lib/postgresql/data
